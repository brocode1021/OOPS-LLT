<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro | OOPS Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0f1a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; margin-top: 2rem; }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2.5rem; font-weight: 800; margin: 0; }

        /* STEP 1: ACTIVITY ROW */
        .activity-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .activity-btn {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 5px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .activity-btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
        }

        .activity-btn .icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        .activity-btn span { font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }

        /* STEP 2: INPUT CARD (Hidden by default) */
        #inputCard {
            display: none; /* JS will change this to 'block' */
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-back {
            background: none;
            color: #64748b;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            display: block;
        }

        /* HISTORY */
        .history-list { margin-top: 3rem; }
        .log-item {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .metric { font-weight: 800; color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FitTrack</h1>
        <p>C++ OOPS Logic Engine</p>
    </header>

    <!-- UI STEP 1: SELECTION -->
    <div id="step1">
        <div class="activity-row">
            <div class="activity-btn" onclick="openInputPage('Running', '🏃‍♂️')">
                <span class="icon">🏃‍♂️</span>
                <span>Run</span>
            </div>
            <div class="activity-btn" onclick="openInputPage('Cycling', '🚲')">
                <span class="icon">🚲</span>
                <span>Cycle</span>
            </div>
            <div class="activity-btn" onclick="openInputPage('Swimming', '🏊‍♂️')">
                <span class="icon">🏊‍♂️</span>
                <span>Swim</span>
            </div>
        </div>
    </div>

    <!-- UI STEP 2: INPUT FORM -->
    <div id="inputCard">
        <button class="btn-back" onclick="goBack()">← Back</button>
        <h2 id="displayTitle" style="margin-top:0;">Running</h2>
        
        <div class="input-group">
            <label id="labelDist">Distance (km)</label>
            <input type="number" id="inDist" placeholder="0.00">
        </div>
        
        <div class="input-group">
            <label>Time (minutes)</label>
            <input type="number" id="inTime" placeholder="0">
        </div>
        
        <button class="btn-save" onclick="saveData()">Save Activity</button>
    </div>

    <!-- HISTORY -->
    <div class="history-list">
        <h3>Recent Activity</h3>
        <div id="logContent"></div>
    </div>
</div>

<script>
    let selectedType = "";
    let selectedIcon = "";

    // 1. Navigation Logic (Switching "Pages")
    function openInputPage(type, icon) {
        selectedType = type;
        selectedIcon = icon;

        // Update UI Text
        document.getElementById('displayTitle').innerText = icon + " " + type;
        document.getElementById('labelDist').innerText = (type === 'Swimming') ? "Distance (meters)" : "Distance (km)";

        // Switch Visibility
        document.getElementById('step1').style.display = 'none';
        document.getElementById('inputCard').style.display = 'block';
    }

    function goBack() {
        document.getElementById('inputCard').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
    }

    // 2. OOPS Logic (Mirroring C++ Classes)
    class Workout {
        constructor(type, icon, dist, time) {
            this.type = type;
            this.icon = icon;
            this.dist = dist;
            this.time = time;
        }

        // Polymorphic Calculation
        calculate() {
            if (this.type === 'Running') return (this.time / this.dist).toFixed(2) + " min/km";
            if (this.type === 'Cycling') return (this.dist / (this.time/60)).toFixed(1) + " km/h";
            return (this.dist / this.time).toFixed(1) + " m/min";
        }
    }

    const dataLogs = [];

    function saveData() {
        const d = parseFloat(document.getElementById('inDist').value);
        const t = parseFloat(document.getElementById('inTime').value);

        if (!d || !t) return alert("Please enter numbers!");

        // Create Object
        const newEntry = new Workout(selectedType, selectedIcon, d, t);
        dataLogs.unshift(newEntry);

        // Update History UI
        const container = document.getElementById('logContent');
        container.innerHTML = dataLogs.map(item => `
            <div class="log-item">
                <div>
                    <strong>${item.icon} ${item.type}</strong><br>
                    <small>${item.dist}${item.type==='Swimming'?'m':'km'} • ${item.time}m</small>
                </div>
                <div class="metric">${item.calculate()}</div>
            </div>
        `).join('');

        // Reset and Go Back
        document.getElementById('inDist').value = "";
        document.getElementById('inTime').value = "";
        goBack();
    }
</script>

</body>
</html>
