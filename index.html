<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack | Premium OOPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent-run: #fbbf24;
            --accent-cycle: #3b82f6;
            --accent-swim: #10b981;
            --bg: #0b0f1a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin-top: 2rem;
        }

        header { text-align: center; margin-bottom: 3rem; }
        header h1 { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        header p { color: #94a3b8; margin-top: 5px; }

        /* Step 1: The Activity Row */
        .activity-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .activity-btn {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px 10px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .activity-btn:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        .activity-btn .icon {
            font-size: 2.8rem; /* Bigger Icons */
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .activity-btn span {
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        /* Step 2: Input Card */
        .card {
            display: none;
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.4s ease-out forwards;
        }

        .card.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* History */
        .history-list { margin-top: 3rem; }
        .log-item {
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-info { display: flex; align-items: center; gap: 15px; }
        .log-icon { font-size: 1.5rem; background: #1e293b; padding: 10px; border-radius: 12px; }
        .log-text h4 { margin: 0; font-size: 1rem; }
        .log-text small { color: #64748b; }
        .metric { font-weight: 800; color: var(--accent-swim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FitTrack</h1>
        <p>Dynamic OOPS Dashboard</p>
    </header>

    <!-- STEP 1 -->
    <div id="activitySelector">
        <div class="activity-row">
            <div class="activity-btn" onclick="select('Running', '🏃‍♂️', 'min/km')">
                <span class="icon">🏃‍♂️</span>
                <span>Run</span>
            </div>
            <div class="activity-btn" onclick="select('Cycling', '🚲', 'km/h')">
                <span class="icon">🚲</span>
                <span>Cycle</span>
            </div>
            <div class="activity-btn" onclick="select('Swimming', '🏊‍♂️', 'm/min')">
                <span class="icon">🏊‍♂️</span>
                <span>Swim</span>
            </div>
        </div>
    </div>

    <!-- STEP 2 -->
    <div id="inputCard" class="card">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 id="cardTitle" style="margin:0">Running</h2>
            <span onclick="closeCard()" style="cursor:pointer; color:#64748b;">✕</span>
        </div>
        
        <div class="input-group">
            <label id="distLabel">Distance (km)</label>
            <input type="number" id="valDist" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>Duration (minutes)</label>
            <input type="number" id="valTime" placeholder="0">
        </div>
        <button class="btn-save" onclick="process()">Add Workout</button>
    </div>
