<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow | OOPS Tracker</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-box {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Page 1: Activity Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .option-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .option-card:hover { border-color: var(--primary); background: #2d3a4f; }
        .option-card i { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

        /* Page 2: Inputs */
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: var(--primary);
            color: white;
        }

        .btn-secondary { background: transparent; border: 1px solid #334155; margin-top: 10px; }

        /* History */
        .log-card {
            background: var(--card);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="app-box">
    <!-- STEP 1: SELECT ACTIVITY -->
    <div id="step1" class="step active">
        <h2>Select Activity</h2>
        <p>What did you do today?</p>
        <div class="grid">
            <div class="option-card" onclick="selectActivity('Running', '🏃')">
                <i>🏃</i> Running
            </div>
            <div class="option-card" onclick="selectActivity('Cycling', '🚲')">
                <i>🚲</i> Cycling
            </div>
            <div class="option-card" onclick="selectActivity('Swimming', '🏊')">
                <i>🏊</i> Swimming
            </div>
        </div>
    </div>

    <!-- STEP 2: INPUT DATA -->
    <div id="step2" class="step">
        <h2 id="selectedTitle">Running</h2>
        <div class="input-group">
            <label id="unitLabel">Distance (km)</label>
            <input type="number" id="distance" placeholder="0.0">
        </div>
        <div class="input-group">
            <label>Time (minutes)</label>
            <input type="number" id="duration" placeholder="0">
        </div>
        <button class="btn" onclick="saveWorkout()">Finish & Calculate</button>
        <button class="btn btn-secondary" onclick="goBack()">Go Back</button>
    </div>

    <!-- HISTORY SECTION -->
    <div id="historySection" style="margin-top: 2rem;">
        <h3 style="color: #94a3b8;">Recent History</h3>
        <div id="logs"></div>
    </div>
</div>

<script>
    let currentActivity = "";
    let currentIcon = "";

    // 1. NAVIGATION LOGIC
    function selectActivity(type, icon) {
        currentActivity = type;
        currentIcon = icon;
        document.getElementById('selectedTitle').innerText = icon + " " + type;
        
        // Change label based on activity
        document.getElementById('unitLabel').innerText = (type === 'Swimming') ? "Distance (meters)" : "Distance (km)";

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function goBack() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    // 2. OOPS-STYLE LOGIC ENGINE
    class Workout {
        constructor(type, icon, dist, time) {
            this.type = type;
            this.icon = icon;
            this.dist = dist;
            this.time = time;
        }

        // Polymorphic calculation logic
        getCalculation() {
            if (this.type === "Running") {
                let pace = this.time / this.dist;
                return pace.toFixed(2) + " min/km";
            } else if (this.type === "Cycling") {
                let speed = this.dist / (this.time / 60);
                return speed.toFixed(1) + " km/h";
            } else {
                return (this.dist / this.time).toFixed(1) + " m/min";
            }
        }
    }

    const history = [];

    function saveWorkout() {
        const d = parseFloat(document.getElementById('distance').value);
        const t = parseFloat(document.getElementById('duration').value);

        if (!d || !t) return alert("Enter valid numbers");

        // Creating a new "Object"
        const workoutObj = new Workout(currentActivity, currentIcon, d, t);
        history.unshift(workoutObj);

        renderHistory();
        
        // Reset and go back
        document.getElementById('distance').value = "";
        document.getElementById('duration').value = "";
        goBack();
    }

    function renderHistory() {
        const container = document.getElementById('logs');
        container.innerHTML = history.map(item => `
            <div class="log-card">
                <div>
                    <strong>${item.icon} ${item.type}</strong><br>
                    <small>${item.dist} ${item.type === 'Swimming' ? 'm' : 'km'} in ${item.time}m</small>
                </div>
                <div style="text-align: right">
                    <span style="color: var(--accent); font-weight: bold;">${item.getCalculation()}</span>
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
