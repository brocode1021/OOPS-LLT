<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro | Dynamic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-speed: 15s;
        }

        /* 1. MULTIPLE COLOR ANIMATED BACKGROUND */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
            
            /* Multi-color Gradient */
            background: linear-gradient(-45deg, #0b0f1a, #1e1b4b, #2e1065, #083344);
            background-size: 400% 400%;
            animation: gradientBG var(--bg-speed) ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { width: 100%; max-width: 500px; z-index: 10; }

        header { text-align: center; margin-bottom: 3rem; }
        header h1 { font-size: 2.8rem; font-weight: 800; margin: 0; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* ACTIVITY BUTTONS ROW */
        .activity-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .activity-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 5px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .activity-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary);
        }

        .activity-btn .icon { font-size: 3.2rem; display: block; margin-bottom: 10px; }
        .activity-btn span { font-weight: 700; font-size: 0.9rem; letter-spacing: 0.5px; }

        /* INPUT CARD */
        #inputCard {
            display: none;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(25px);
            padding: 2.5rem;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 10px; color: #94a3b8; font-weight: 600; }
        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 1.2rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.5); }

        .btn-save {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-back {
            background: none;
            color: #94a3b8;
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* LOGS */
        .history-list { margin-top: 3rem; }
        .log-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .log-item:hover { background: rgba(255, 255, 255, 0.08); }
        .metric { font-weight: 800; font-size: 1.2rem; color: #2dd4bf; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FitTrack Pro</h1>
        <p>Interactive OOPS Engine</p>
    </header>

    <!-- STEP 1: ACTIVITY SELECTION -->
    <div id="step1">
        <div class="activity-row">
            <div class="activity-btn" onclick="openPage('Running', '🏃‍♂️', '#fbbf24')">
                <span class="icon">🏃‍♂️</span>
                <span>RUN</span>
            </div>
            <div class="activity-btn" onclick="openPage('Cycling', '🚲', '#3b82f6')">
                <span class="icon">🚲</span>
                <span>CYCLE</span>
            </div>
            <div class="activity-btn" onclick="openPage('Swimming', '🏊‍♂️', '#10b981')">
                <span class="icon">🏊‍♂️</span>
                <span>SWIM</span>
            </div>
        </div>
    </div>

    <!-- STEP 2: INPUT PAGE -->
    <div id="inputCard">
        <button class="btn-back" onclick="goBack()">← CHANGE ACTIVITY</button>
        <h2 id="pageTitle" style="margin-top:0; font-size: 2rem;">Running</h2>
        
        <div class="input-group">
            <label id="labelUnits">Distance (km)</label>
            <input type="number" id="fieldDist" placeholder="0.00">
        </div>
        
        <div class="input-group">
            <label>Time (minutes)</label>
            <input type="number" id="fieldTime" placeholder="0">
        </div>
        
        <button class="btn-save" onclick="saveToOOPS()">LOG WORKOUT</button>
    </div>

    <!-- HISTORY -->
    <div class="history-list">
        <h3 style="color: #94a3b8; letter-spacing: 1px;">HISTORY</h3>
        <div id="historyBox"></div>
    </div>
</div>

<script>
    let currentType = "";
    let currentIcon = "";

    // 1. DYNAMIC NAVIGATION
    function openPage(type, icon, color) {
        currentType = type;
        currentIcon = icon;

        // Change "Theme" color based on activity
        document.documentElement.style.setProperty('--primary', color);
        
        document.getElementById('pageTitle').innerText = icon + " " + type;
        document.getElementById('labelUnits').innerText = (type === 'Swimming') ? "Distance (meters)" : "Distance (km)";

        document.getElementById('step1').style.display = 'none';
        document.getElementById('inputCard').style.display = 'block';
    }

    function goBack() {
        document.getElementById('inputCard').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
        document.documentElement.style.setProperty('--primary', '#6366f1'); // Reset color
    }

    // 2. OOPS LOGIC ENGINE (Classes)
    class Workout {
        constructor(type, icon, dist, time) {
            this.type = type;
            this.icon = icon;
            this.dist = dist;
            this.time = time;
        }

        // Polymorphic Logic
        calculate() {
            if (this.type === 'Running') return (this.time / this.dist).toFixed(2) + " min/km";
            if (this.type === 'Cycling') return (this.dist / (this.time/60)).toFixed(1) + " km/h";
            return (this.dist / this.time).toFixed(1) + " m/min";
        }
    }

    const memory = [];

    function saveToOOPS() {
        const d = parseFloat(document.getElementById('fieldDist').value);
        const t = parseFloat(document.getElementById('fieldTime').value);

        if (!d || !t) return alert("Please input metrics!");

        const workoutObj = new Workout(currentType, currentIcon, d, t);
        memory.unshift(workoutObj);

        // Update UI
        const box = document.getElementById('historyBox');
        box.innerHTML = memory.map(item => `
            <div class="log-item" style="border-left: 5px solid var(--primary)">
                <div>
                    <span style="font-size: 1.5rem">${item.icon}</span> 
                    <strong>${item.type}</strong><br>
                    <small style="color:#94a3b8">${item.dist}${item.type==='Swimming'?'m':'km'} in ${item.time}m</small>
                </div>
                <div class="metric">${item.calculate()}</div>
            </div>
        `).join('');

        // Reset
        document.getElementById('fieldDist').value = "";
        document.getElementById('fieldTime').value = "";
        goBack();
    }
</script>

</body>
</html>
