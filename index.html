<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro | Interactive OOPS</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
        }

        .header { text-align: center; margin-bottom: 2rem; }

        /* Form Styling */
        .card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; }

        /* History List */
        .history-item {
            background: #334155;
            padding: 1rem;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .pace-badge {
            background: var(--success);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 1rem; }
        .tab-btn { background: none; border: 1px solid var(--primary); width: auto; flex: 1; }
        .tab-btn.active { background: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🏃‍♂️ FitTrack Pro</h1>
        <p>C++ OOPS Logic Implementation</p>
    </div>

    <!-- Input Section (The Constructor Simulator) -->
    <div class="card">
        <h3>Log New Workout</h3>
        <input type="text" id="workoutName" placeholder="Workout Name (e.g. Morning Run)">
        <input type="number" id="distance" placeholder="Distance (km)">
        <input type="number" id="duration" placeholder="Time (minutes)">
        <button onclick="addWorkout()">Add to History & Calculate Pace</button>
    </div>

    <!-- Stats & History Section -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('history')">Workout History</button>
    </div>

    <div id="historyList">
        <!-- Logs will appear here -->
    </div>
</div>

<script>
    // MIRRORING C++ OOP STRUCTURE IN JAVASCRIPT
    class Workout {
        constructor(name, duration, distance) {
            this.name = name;
            this.duration = duration;
            this.distance = distance;
            this.date = new Date().toLocaleDateString();
        }

        // Polymorphic-style calculation
        calculatePace() {
            if (this.distance <= 0) return 0;
            return (this.duration / this.distance).toFixed(2);
        }
    }

    let logs = [];

    function addWorkout() {
        const name = document.getElementById('workoutName').value;
        const dist = parseFloat(document.getElementById('distance').value);
        const dur = parseFloat(document.getElementById('duration').value);

        if (!name || !dist || !dur) {
            alert("Please fill all fields");
            return;
        }

        // Instantiate "Class"
        const newWorkout = new Workout(name, dur, dist);
        logs.unshift(newWorkout); // Add to start of history
        
        renderHistory();
        clearInputs();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";

        logs.forEach(workout => {
            const pace = workout.calculatePace();
            list.innerHTML += `
                <div class="history-item">
                    <div>
                        <strong>${workout.name}</strong><br>
                        <small>${workout.date} | ${workout.distance}km in ${workout.duration}m</small>
                    </div>
                    <div class="pace-badge">${pace} min/km</div>
                </div>
            `;
        });
    }

    function clearInputs() {
        document.getElementById('workoutName').value = "";
        document.getElementById('distance').value = "";
        document.getElementById('duration').value = "";
    }
</script>

</body>
</html>
